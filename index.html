<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>完全外透明科技电路组件</title>
    <style>
        /* 核心改动：网页背景彻底全透，去除所有预设颜色 */
        html, body {
            margin: 0;
            padding: 0;
            background: transparent !important; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* 大方框容器（400x300）：外部全透，内部保留毛玻璃折射层 */
        .component-container {
            width: 400px;
            height: 300px;
            position: relative;
            overflow: hidden;
            border-radius: 16px;
            
            /* 仅保留极微量的白透，让毛玻璃滤镜对下层网页内容产生高科技质感的折射 */
            background: rgba(255, 255, 255, 0.01); 
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            
            /* 细腻的半透明边缘，确保在任何深浅背景下都自然、不突兀 */
            border: 1px solid rgba(0, 242, 254, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 外层 Canvas：负责中心小方块四周的光速发散 */
        #speedCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* 中心跳动数字方框外壳 */
        .number-box-wrapper {
            position: relative;
            width: 220px;
            height: 120px;
            z-index: 5;
            cursor: pointer;
            animation: pulse 0.8s infinite alternate ease-in-out;
        }

        /* 中心数字方框本体 */
        .number-box {
            position: relative;
            width: 100%;
            height: 100%;
            background: rgba(0, 242, 254, 0.02); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid #00f2fe;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.5), inset 0 0 15px rgba(0, 242, 254, 0.2);
            border-radius: 14px;
            overflow: hidden; 
            
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        /* 内部电路 Canvas */
        #circuitCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; 
            opacity: 0.85; 
        }

        /* 霸气的大数字文本层 */
        .number-text {
            position: relative;
            z-index: 2;
            color: #00f2fe;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace; 
            text-shadow: 0 0 15px #00f2fe, 0 0 30px rgba(0, 242, 254, 0.6);
            user-select: none;
            white-space: nowrap; 
            letter-spacing: 1px; 
            transition: font-size 0.15s ease; 
        }

        /* 鼠标悬停强化 */
        .number-box-wrapper:hover .number-box {
            border-color: #ffffff;
            background: rgba(0, 242, 254, 0.06);
            box-shadow: 0 0 35px #ffffff, inset 0 0 20px rgba(0, 242, 254, 0.4);
        }
        .number-box-wrapper:hover .number-text {
            color: #ffffff;
            text-shadow: 0 0 20px #00f2fe, 0 0 40px #4facfe;
        }

        /* 跳动动画 */
        @keyframes pulse {
            0% { transform: scale(0.96); }
            100% { transform: scale(1.04); }
        }

        /* ==================== 内置设置弹窗样式 ==================== */
        .setting-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(6, 8, 14, 0.8);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            color: #fff;
        }

        .setting-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-title {
            font-size: 16px;
            color: #00f2fe;
            margin-bottom: 15px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            width: 240px;
            justify-content: space-between;
        }

        .input-group label {
            font-size: 13px;
            color: #ccc;
        }

        .input-group input {
            width: 120px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(0, 242, 254, 0.4);
            border-radius: 6px;
            color: #fff;
            padding: 5px 8px;
            font-size: 13px;
            text-align: center;
            outline: none;
        }

        .input-group input:focus {
            border-color: #00f2fe;
            box-shadow: 0 0 8px rgba(0, 242, 254, 0.5);
        }

        .btn-group {
            margin-top: 15px;
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 6px 22px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            border: none;
        }

        .btn-save {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            color: #000;
            font-weight: bold;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.15);
            color: #ccc;
        }
    </style>
</head>
<body>

    <div class="component-container">
        <canvas id="speedCanvas"></canvas>
        
        <div class="number-box-wrapper" id="openSettingBtn">
            <div class="number-box">
                <canvas id="circuitCanvas"></canvas>
                <div class="number-text" id="numBox" title="点击设置范围">00000</div>
            </div>
        </div>

        <div class="setting-modal" id="settingModal">
            <div class="modal-title">⚙️ 配置跳动参数</div>
            <div class="input-group">
                <label>最小值 (Min):</label>
                <input type="number" id="minInput" value="10000">
            </div>
            <div class="input-group">
                <label>最大值 (Max):</label>
                <input type="number" id="maxInput" value="99999">
            </div>
            <div class="input-group">
                <label>速度 (ms/次):</label>
                <input type="number" id="intervalInput" value="150" min="20">
            </div>
            <div class="btn-group">
                <button class="btn btn-cancel" id="btnCancel">取消</button>
                <button class="btn btn-save" id="btnSave">保存</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 核心可调节全局变量 ====================
        let CONFIG = {
            minNum: 45000, 
            maxNum: 45129,
            interval: 150
        };

        let timer = null;
        const numBox = document.getElementById('numBox');
        const modal = document.getElementById('settingModal');
        const openSettingBtn = document.getElementById('openSettingBtn');

        // === 1. 数字跳动控制 ===
        function startNumberAnimation() {
            if (timer) clearInterval(timer);
            const maxLength = CONFIG.maxNum.toString().length;

            function updateNumber() {
                const min = Math.min(CONFIG.minNum, CONFIG.maxNum);
                const max = Math.max(CONFIG.minNum, CONFIG.maxNum);
                const range = max - min + 1;
                const randomNum = Math.floor(Math.random() * range) + min;
                
                const strNum = randomNum.toString().padStart(maxLength, '0');
                numBox.textContent = strNum;

                // 霸气大字号区间自适应
                if (strNum.length <= 2) {
                    numBox.style.fontSize = '56px';
                } else if (strNum.length === 3) {
                    numBox.style.fontSize = '52px';
                } else if (strNum.length === 4) {
                    numBox.style.fontSize = '46px';
                } else if (strNum.length === 5) {
                    numBox.style.fontSize = '42px'; 
                } else {
                    numBox.style.fontSize = '32px'; 
                }
            }

            updateNumber();
            timer = setInterval(updateNumber, CONFIG.interval);
        }

        // === 2. 弹窗交互逻辑 ===
        const minInput = document.getElementById('minInput');
        const maxInput = document.getElementById('maxInput');
        const intervalInput = document.getElementById('intervalInput');

        openSettingBtn.addEventListener('click', () => {
            minInput.value = CONFIG.minNum;
            maxInput.value = CONFIG.maxNum;
            intervalInput.value = CONFIG.interval;
            modal.classList.add('active');
        });

        document.getElementById('btnCancel').addEventListener('click', (e) => {
            e.stopPropagation();
            modal.classList.remove('active');
        });

        document.getElementById('btnSave').addEventListener('click', (e) => {
            e.stopPropagation();
            const minVal = parseInt(minInput.value, 10) || 0;
            const maxVal = parseInt(maxInput.value, 10) || 100;
            const intervalVal = Math.max(20, parseInt(intervalInput.value, 10) || 150);

            CONFIG.minNum = minVal;
            CONFIG.maxNum = maxVal;
            CONFIG.interval = intervalVal;

            modal.classList.remove('active');
            startNumberAnimation();
        });

        startNumberAnimation();


        // === 3. 透明底色电路走向图引擎 ===
        const circuitCanvas = document.getElementById('circuitCanvas');
        const cCtx = circuitCanvas.getContext('2d');
        const boxWidth = 220; 
        const boxHeight = 120; 
        circuitCanvas.width = boxWidth;
        circuitCanvas.height = boxHeight;

        class Trace {
            constructor() { this.reset(); }
            reset() {
                const side = Math.floor(Math.random() * 4);
                if(side === 0) { this.x = Math.random()*boxWidth; this.y = 0; this.dx = 0; this.dy = 1; }
                else if(side === 1) { this.x = boxWidth; this.y = Math.random()*boxHeight; this.dx = -1; this.dy = 0; }
                else if(side === 2) { this.x = Math.random()*boxWidth; this.y = boxHeight; this.dx = 0; this.dy = -1; }
                else { this.x = 0; this.y = Math.random()*boxHeight; this.dx = 1; this.dy = 0; }

                this.history = [{x: this.x, y: this.y}];
                this.speed = 1.3;
                this.life = 0;
                this.maxLife = Math.random() * 40 + 30; 
                this.color = Math.random() > 0.4 ? 'rgba(0, 242, 254, 0.75)' : 'rgba(79, 172, 254, 0.75)';
                this.hasNode = Math.random() > 0.3; 
            }
            update() {
                this.life++;
                if (this.life % 12 === 0 && Math.random() > 0.3) {
                    const angles = [0, Math.PI/4, -Math.PI/4, Math.PI/2, -Math.PI/2];
                    const choice = angles[Math.floor(Math.random() * angles.length)];
                    const currentAngle = Math.atan2(this.dy, this.dx) + choice;
                    this.dx = Math.cos(currentAngle);
                    this.dy = Math.sin(currentAngle);
                }

                this.x += this.dx * this.speed;
                this.y += this.dy * this.speed;
                this.history.push({x: this.x, y: this.y});

                if (this.life >= this.maxLife || this.x < 0 || this.x > boxWidth || this.y < 0 || this.y > boxHeight) {
                    this.reset();
                }
            }
            draw() {
                if (this.history.length < 2) return;
                cCtx.beginPath();
                cCtx.moveTo(this.history[0].x, this.history[0].y);
                for(let i=1; i<this.history.length; i++) {
                    cCtx.lineTo(this.history[i].x, this.history[i].y);
                }
                cCtx.strokeStyle = this.color;
                cCtx.lineWidth = 1.2;
                cCtx.stroke();

                if (this.hasNode && this.life === this.history.length) {
                    cCtx.beginPath();
                    cCtx.arc(this.x, this.y, 2.5, 0, Math.PI*2);
                    cCtx.fillStyle = '#ffffff';
                    cCtx.shadowBlur = 6;
                    cCtx.shadowColor = '#00f2fe';
                    cCtx.fill();
                    cCtx.shadowBlur = 0; 
                }
            }
        }

        const traces = Array.from({length: 12}, () => new Trace());


        // === 4. 四周光速无限发散 Canvas 引擎 ===
        const canvas = document.getElementById('speedCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 400; canvas.height = 300;
        const centerX = 200; const centerY = 150;

        const particles = [];
        const maxParticles = 85;
        const colorPool = [{r: 0, g: 242, b: 254}, {r: 79, g: 172, b: 254}, {r: 255, g: 255, b: 255}];

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.angle = Math.random() * Math.PI * 2;
                const rx = 110; 
                const ry = 60;  
                this.x = centerX + Math.cos(this.angle) * rx;
                this.y = centerY + Math.sin(this.angle) * ry;
                
                this.speed = Math.random() * 1.2 + 0.5; 
                this.acceleration = 1.09; 
                this.length = Math.random() * 6 + 3;
                this.baseColor = colorPool[Math.floor(Math.random() * colorPool.length)];
                this.opacity = 1;
            }
            update() {
                this.speed *= this.acceleration;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                this.length *= 1.05;

                let currentDist = Math.hypot(this.x - centerX, this.y - centerY);
                if (currentDist > 110) {
                    this.opacity = Math.max(0, 1 - (currentDist - 110) / 90);
                }
                if (this.x < 0 || this.x > 400 || this.y < 0 || this.y > 300 || this.opacity <= 0) {
                    this.reset();
                }
            }
            draw() {
                if (this.opacity <= 0) return;
                ctx.beginPath();
                const startX = this.x - Math.cos(this.angle) * this.length;
                const startY = this.y - Math.sin(this.angle) * this.length;
                ctx.moveTo(startX, startY); ctx.lineTo(this.x, this.y);
                ctx.strokeStyle = `rgba(${this.baseColor.r}, ${this.baseColor.g}, ${this.baseColor.b}, ${this.opacity * 0.7})`;
                ctx.lineWidth = 1.8;
                ctx.stroke();
            }
        }

        for (let i = 0; i < maxParticles; i++) {
            particles.push(new Particle());
            let p = particles[i];
            let preRun = Math.random() * 15;
            p.speed = p.speed * Math.pow(p.acceleration, preRun);
            p.x += Math.cos(p.angle) * p.speed; p.y += Math.sin(p.angle) * p.speed;
        }

        // === 5. 统一动画主循环 ===
        function animate() {
            cCtx.clearRect(0, 0, boxWidth, boxHeight);
            traces.forEach(t => { t.update(); t.draw(); });

            ctx.clearRect(0, 0, 400, 300);
            particles.forEach(p => { p.update(); p.draw(); });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
